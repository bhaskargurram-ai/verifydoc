name: Claude code review

# AI dev-agent: reviews every PR and responds to @claude mentions in issues/PRs.
# Inert until an ANTHROPIC_API_KEY secret is added to the repo (Settings →
# Secrets → Actions); the guard below skips the job when it's absent.

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: ${{ github.event_name == 'pull_request' || contains(github.event.comment.body, '@claude') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Guard on secret
        id: guard
        run: |
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY not set — skipping Claude review (add the secret to enable)."
          fi
      - name: Claude review
        if: steps.guard.outputs.enabled == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for correctness bugs, missing tests, and violations of
            the VerifyDoc golden rules (adapters isolated; stages decoupled; never
            tune on test; no network in unit tests; every metric matches its
            definition). Be concise; flag only real issues.
