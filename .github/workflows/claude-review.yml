name: Claude PR review

# Fork-safe AI reviewer using the ANTHROPIC_API_KEY secret.
#
# SECURITY MODEL (why the key cannot leak / be misused):
#   * Runs on pull_request_target, so the secret is available even for fork PRs.
#   * It NEVER checks out or executes PR-authored code. It only fetches the diff
#     *text* via `gh pr diff` (GITHUB_TOKEN, read-only) and sends that text to the
#     Anthropic API. A malicious fork therefore has no code-execution surface in
#     the job that holds the secret, so it cannot exfiltrate it.
#   * The key is passed only as an env var to the single API step; GitHub also
#     auto-redacts registered secrets from all logs.
#   * There is deliberately NO interactive/agentic path that executes repo code
#     with the key (e.g. claude-code-action running a fork's build/tests) — that
#     is the one surface that could leak the secret, so it is omitted entirely.
#
# The review is advisory: it posts findings and sets a `claude-approved` /
# `claude-changes-requested` label that the auto-merge workflow consumes. CI
# (ruff/black/mypy/pytest) remains the real merge gate.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Guard on secret
        id: guard
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY not set — skipping (free GitHub Models reviewer still runs)."
          fi

      - name: Fetch diff (no checkout of PR code)
        if: steps.guard.outputs.enabled == 'true'
        run: |
          gh pr diff "$PR" --repo "$REPO" > /tmp/diff.txt 2>/dev/null || true
          head -c 40000 /tmp/diff.txt > /tmp/diff_trunc.txt
          echo "diff bytes: $(wc -c < /tmp/diff_trunc.txt)"

      - name: Review with Claude (diff text only)
        if: steps.guard.outputs.enabled == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, urllib.request

          try:
              diff = open("/tmp/diff_trunc.txt", encoding="utf-8", errors="replace").read()
          except FileNotFoundError:
              diff = ""
          if len(diff.strip()) < 5:
              print("no reviewable diff; skipping")
              raise SystemExit(0)

          system = (
              "You are a senior code reviewer for VerifyDoc, a document-extraction "
              "trust layer. Review the unified diff for correctness bugs, missing "
              "tests, and violations of its rules: model SDKs only inside adapters/; "
              "stages decoupled; never tune calibration on the test split; no network "
              "in unit tests; every metric matches its cited definition. List at most "
              "6 concrete findings, most severe first. Then, on the FINAL line, output "
              "exactly 'VERDICT: APPROVE' if you found no blocking correctness/security "
              "issue, otherwise 'VERDICT: REQUEST_CHANGES'."
          )
          body = {
              "model": "claude-sonnet-5",
              "max_tokens": 1500,
              "system": system,
              "messages": [{"role": "user", "content": "Review this PR diff:\n\n" + diff}],
          }
          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(body).encode(),
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=120) as r:
                  data = json.load(r)
              text = "".join(
                  b.get("text", "") for b in data.get("content", []) if b.get("type") == "text"
              )
          except Exception as exc:  # rate limit / transient — never fail the PR
              print("Anthropic API unavailable:", str(exc)[:200])
              raise SystemExit(0)

          approve = "VERDICT: APPROVE" in text.upper()
          pr = os.environ["PR"]
          repo = os.environ["REPO"]  # no checkout, so gh needs --repo to resolve the PR
          comment = (
              "### 🤖 Claude review\n\n" + text +
              "\n\n_Automated review — advisory, not a security boundary. "
              "CI (ruff/black/mypy/pytest) is the merge gate._"
          )
          subprocess.run(["gh", "pr", "comment", pr, "--repo", repo, "--body", comment], check=False)
          add = "claude-approved" if approve else "claude-changes-requested"
          rm = "claude-changes-requested" if approve else "claude-approved"
          subprocess.run(["gh", "pr", "edit", pr, "--repo", repo, "--add-label", add], check=False)
          subprocess.run(["gh", "pr", "edit", pr, "--repo", repo, "--remove-label", rm], check=False)
          print("posted review; verdict:", "APPROVE" if approve else "REQUEST_CHANGES")
          PY
