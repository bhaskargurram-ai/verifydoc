name: Docs

# Build the MkDocs site on every PR (validation) and deploy it to GitHub Pages
# on push to main. Deploy requires Pages to be enabled (Settings → Pages →
# Source: GitHub Actions) — until then the build job still validates the docs.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material
      # not --strict: some docs link to repo files (CONTRIBUTING, examples/) that
      # live outside the docs tree and render on GitHub, not the site.
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
