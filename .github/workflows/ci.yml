name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"
      - name: Ruff
        run: ruff check verifydoc tests
      - name: Black
        run: black --check verifydoc tests
      - name: Mypy
        run: mypy verifydoc
      - name: Pytest (eval coverage gate 80%)
        run: |
          pytest --cov=verifydoc --cov-report=term-missing --cov-report=xml
          python -m coverage report --include="verifydoc/eval/*" --fail-under=80
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.12'
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build & install the wheel (packaging sanity)
        run: |
          python -m pip install --upgrade pip build
          python -m build
          pip install dist/*.whl
          python -c "import verifydoc; print('verifydoc', verifydoc.__version__)"
          verifydoc version
