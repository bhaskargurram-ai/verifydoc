name: Docker

# Build the image to validate the Dockerfile on PRs that touch it, and push it
# to GitHub Container Registry (ghcr.io/bhaskargurram-ai/verifydoc) on release
# tags (v*). No secret needed — uses the built-in GITHUB_TOKEN.

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/bhaskargurram-ai/verifydoc
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Log in to ghcr.io
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
