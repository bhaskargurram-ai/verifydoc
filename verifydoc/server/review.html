<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0e8a16">
<title>VerifyDoc — review cockpit</title>
<style>
 :root{--ok:#0e8a16;--rev:#d93f0b;--done:#1f6feb;--bg:#0d1117;--fg:#e6edf3;--card:#161b22;--mut:#8b949e;--line:#30363d}
 *{box-sizing:border-box} body{margin:0;font:14px/1.5 system-ui,sans-serif;background:var(--bg);color:var(--fg)}
 header{display:flex;align-items:center;gap:16px;padding:12px 18px;border-bottom:1px solid var(--line)}
 header h1{margin:0;font-size:17px} .sum{color:var(--mut);font-size:13px}
 header .grow{flex:1}
 button{padding:8px 14px;background:var(--ok);color:#fff;border:0;border-radius:6px;font-weight:600;cursor:pointer}
 button.ghost{background:#21262d;color:var(--fg);border:1px solid var(--line)}
 .controls{display:flex;flex-wrap:wrap;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);align-items:end}
 .controls label{display:block;font-size:12px;color:var(--mut);margin-bottom:3px}
 input,textarea,select{background:var(--card);color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:7px;font:inherit}
 textarea{min-height:52px;width:320px} .controls .schema textarea{width:360px}
 .queue{display:flex;gap:8px;overflow-x:auto;padding:10px 18px;border-bottom:1px solid var(--line)}
 .queue:empty{display:none}
 .qchip{white-space:nowrap;padding:6px 11px;background:var(--card);border:1px solid var(--line);border-radius:16px;font-size:12px;cursor:pointer;color:var(--fg)}
 .qchip.done{border-color:var(--ok)} .qchip.error{border-color:var(--rev)} .qchip.running{border-color:var(--done)}
 .qchip.sel{outline:2px solid var(--done)}
 main{display:grid;grid-template-columns:minmax(360px,1fr) minmax(360px,1fr);gap:0;height:calc(100vh - 172px)}
 .pane{overflow:auto;padding:14px} .pane.left{border-right:1px solid var(--line)}
 h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:0 0 10px}
 .field{padding:9px 11px;margin:7px 0;background:var(--card);border-left:4px solid var(--mut);border-radius:6px;cursor:pointer}
 .field.accept{border-left-color:var(--ok)} .field.review{border-left-color:var(--rev)} .field.done{border-left-color:var(--done)}
 .field.sel{outline:2px solid var(--done)}
 .field .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
 .field .path{font-weight:600} .field .badge{font-size:11px;color:var(--mut)}
 .field input.val{width:100%;margin-top:6px}
 .bar{height:4px;background:#21262d;border-radius:2px;margin-top:7px;overflow:hidden}
 .bar>i{display:block;height:100%;background:var(--ok)}
 .src{white-space:pre-wrap;font:13px/1.6 ui-monospace,monospace;background:var(--card);padding:12px;border-radius:6px}
 mark{border-radius:3px;padding:0 1px;cursor:pointer} mark.accept{background:#1a4d2e;color:#c9f5d5}
 mark.review{background:#5a2418;color:#ffd6cc} mark.done{background:#12385f;color:#cfe6ff} mark.flash{outline:2px solid var(--fg)}
 .hint{color:var(--mut);font-size:12px;margin-top:8px} .err{color:var(--rev)}
</style></head><body>
<header>
 <h1>🔒 VerifyDoc</h1>
 <div class="sum" id="summary">▶ Click <b>Verify</b> to try the sample, or upload one or many PDFs. Local extraction is free; for the Claude model, paste your own key (never stored).</div>
 <div class="grow"></div>
 <button class="ghost" onclick="exportJSON()">Export JSON</button>
 <button class="ghost" onclick="clearQueue()">Clear queue</button>
</header>
<div class="controls">
 <div><label>Upload PDF/image (one or many)</label><input type="file" id="file" multiple></div>
 <div><label>…or paste document text</label><textarea id="text" placeholder="paste a receipt/invoice">ACME Supplies Ltd
Invoice #: INV-2024-0912
Date: 2024-03-04
Subtotal: 1,100.00
Tax: 134.50
Total: $1,234.50</textarea></div>
 <div class="schema"><label>Schema (JSON)</label><textarea id="schema">{"type":"object","properties":{"invoice_id":{"type":"string"},"vendor":{"type":"string","x-scoring":"semantic"},"date":{"type":"string"},"total":{"type":"number","x-numeric-tol":0.01}}}</textarea></div>
 <div><label>Adapter</label><br><select id="adapter"><option>text-search</option><option>rapidocr</option><option>api-vlm</option><option>hf-vlm</option></select></div>
 <div><label>Threshold</label><br><input id="threshold" type="number" value="0.8" step="0.05" min="0" max="1" style="width:80px"></div>
 <div><label>Anthropic key (optional · for api-vlm)</label><br><input id="apikey" type="password" placeholder="sk-ant-… used only for this request" autocomplete="off" style="width:250px"></div>
 <div><button onclick="run()">Verify</button></div>
</div>
<div class="queue" id="queue"></div>
<main>
 <div class="pane left"><h2>Fields — ⚠️ review need a human (Tab to move · Enter to confirm)</h2><div id="fields"></div></div>
 <div class="pane right"><h2>Source</h2><div id="source" class="src">—</div></div>
</main>
<script>
// A queue of documents; each job carries its own verified fields + review state.
// Review progress persists in localStorage so a refresh never loses work (#28).
const LS_KEY = "verifydoc.queue.v1";
let STATE = {queue: [], cur: -1};
const PENDING_FILES = {};   // job.id -> File (transient; not persisted across reloads)
let _seq = 0;
function uid(){ return "j" + Date.now().toString(36) + (_seq++); }

function flatten(nested){
 const out=[];
 (function walk(o,p){for(const k in o){const v=o[k];const np=p?p+"."+k:k;
   if(v&&typeof v==="object"&&"decision"in v)out.push(Object.assign({path:np},v));
   else if(v&&typeof v==="object")walk(v,np);}})(nested,"");
 return out;
}

function firstLine(t){ const l=(t.split("\n").find(x=>x.trim())||"document").trim(); return l.length>28?l.slice(0,28)+"…":l; }
function activeJob(){ return STATE.cur>=0 ? STATE.queue[STATE.cur] : null; }

function addJobsFromInputs(){
 const files=document.getElementById("file").files;
 const text=document.getElementById("text").value;
 let added=0;
 if(files&&files.length){
  for(const f of files){
   const id=uid(); PENDING_FILES[id]=f;
   STATE.queue.push({id,name:f.name,kind:"file",text:"",status:"pending",fields:[],sel:-1,error:null});
   added++;
  }
  document.getElementById("file").value="";
 }
 if(text&&text.trim()){
  const id=uid();
  STATE.queue.push({id,name:firstLine(text),kind:"text",text,status:"pending",fields:[],sel:-1,error:null});
  added++;
 }
 return added;
}

async function verifyJob(job,opts){
 let res;
 if(job.kind==="file"){
  const f=PENDING_FILES[job.id];
  if(!f) throw new Error("file not available (reload dropped it) — re-add it");
  const fd=new FormData(); fd.append("file",f); fd.append("schema",opts.schema);
  fd.append("adapter",opts.adapter); fd.append("threshold",opts.threshold);
  if(opts.apikey)fd.append("api_key",opts.apikey);
  res=await fetch("/verify/upload",{method:"POST",body:fd});
 }else{
  res=await fetch("/verify",{method:"POST",headers:{"Content-Type":"application/json"},
   body:JSON.stringify({document:job.text,schema:JSON.parse(opts.schema),adapter:opts.adapter,threshold:opts.threshold,api_key:opts.apikey||null})});
 }
 if(!res.ok) throw new Error(await res.text());
 const data=await res.json();
 job.fields=flatten(data.fields); job.error=null;
}

async function run(){
 addJobsFromInputs(); persist(); render();
 const opts={schema:document.getElementById("schema").value,adapter:document.getElementById("adapter").value,
             threshold:parseFloat(document.getElementById("threshold").value),apikey:document.getElementById("apikey").value.trim()};
 for(let i=0;i<STATE.queue.length;i++){
  const job=STATE.queue[i];
  if(job.status!=="pending"&&job.status!=="error")continue;
  if(job.kind==="file"&&!PENDING_FILES[job.id])continue;   // can't re-run a dropped file
  job.status="running"; if(STATE.cur<0)STATE.cur=i; render();
  try{ await verifyJob(job,opts); job.status="done"; }
  catch(e){ job.status="error"; job.error=String(e); }
  persist(); render();
 }
 if(STATE.cur<0&&STATE.queue.length)STATE.cur=0;
 render();
}

function cls(f){return f.reviewed?"done":f.decision;}

function render(){ renderSummary(); renderQueue(); renderActive(); }

function renderSummary(){
 const q=STATE.queue;
 if(!q.length){document.getElementById("summary").innerHTML=
   "▶ Add documents (upload one or many, or paste text) and click <b>Verify</b>. Local extraction is free; for the Claude model, paste your own key (never stored).";return;}
 let nF=0,nAcc=0,nRev=0,done=0;
 for(const j of q){ if(j.status==="done"){done++; nF+=j.fields.length;
   nAcc+=j.fields.filter(f=>f.decision==="accept").length; nRev+=j.fields.filter(f=>f.decision==="review").length; } }
 document.getElementById("summary").textContent=
   `${q.length} doc(s) · ${done} verified · ${nF} fields · ${nAcc} accepted · ${nRev} to review · STP ${nF?(100*nAcc/nF).toFixed(0):0}%`;
}

function renderQueue(){
 const el=document.getElementById("queue"); el.innerHTML="";
 STATE.queue.forEach((j,i)=>{
  const c=document.createElement("div"); c.className="qchip "+j.status+(i===STATE.cur?" sel":"");
  const icon=j.status==="done"?"✅":j.status==="running"?"⏳":j.status==="error"?"⛔":"•";
  const stp=(j.status==="done"&&j.fields.length)?" · "+(100*j.fields.filter(f=>f.decision==="accept").length/j.fields.length).toFixed(0)+"%":"";
  c.textContent=`${icon} ${j.name}${stp}`; c.title=j.error||j.name;
  c.addEventListener("click",()=>{STATE.cur=i; render();});
  el.appendChild(c);
 });
}

function renderActive(){
 const job=activeJob();
 const fd=document.getElementById("fields"); const src=document.getElementById("source");
 fd.innerHTML=""; src.classList.remove("err");
 if(!job){ src.textContent="—"; return; }
 if(job.status==="running"){ src.textContent="Verifying "+job.name+"…"; return; }
 if(job.status==="error"){ src.classList.add("err"); src.textContent=job.error||"error"; return; }
 const F=job.fields;
 F.forEach((f,i)=>{
  const d=document.createElement("div"); d.className="field "+cls(f)+(i===job.sel?" sel":""); d.dataset.i=i;
  const conf=(f.confidence*100).toFixed(0);
  const where=f.grounding?(" · page "+f.grounding.page):" · not grounded";
  d.innerHTML=`<div class="top"><span class="path">${f.path}</span>`+
    `<span class="badge">${f.reviewed?"✔ confirmed":(f.decision==="accept"?"✅ accept":"⚠️ review")} · ${conf}%${where}</span></div>`+
    `<div class="bar"><i style="width:${conf}%;background:${f.decision==="accept"?"var(--ok)":"var(--rev)"}"></i></div>`;
  const inp=document.createElement("input"); inp.className="val"; inp.value=(f.value==null?"":f.value);
  inp.addEventListener("input",e=>{f.value=e.target.value; f.edited=true; persist();});
  d.appendChild(inp);
  d.addEventListener("click",()=>select(i));
  fd.appendChild(d);
 });
 if(job.kind==="text"&&job.text){
  const spans=F.map((f,i)=>({i,s:f.grounding&&f.grounding.char_span?f.grounding.char_span[0]:-1,
                             e:f.grounding&&f.grounding.char_span?f.grounding.char_span[1]:-1,f}))
                .filter(x=>x.s>=0&&x.e>x.s).sort((a,b)=>a.s-b.s);
  let html="",cur=0;
  for(const x of spans){ if(x.s<cur)continue;
    html+=esc(job.text.slice(cur,x.s))+`<mark class="${cls(x.f)}" data-i="${x.i}" onclick="select(${x.i})">`+esc(job.text.slice(x.s,x.e))+"</mark>";
    cur=x.e; }
  html+=esc(job.text.slice(cur));
  src.innerHTML=html||esc(job.text);
 }else{
  src.innerHTML=`<div class="hint">Uploaded file — per-field grounding shown on the left (page/bbox). Paste text to see inline source highlighting.</div>`;
 }
}

function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function select(i){
 const job=activeJob(); if(!job)return;
 job.sel=i; render();
 const mark=document.querySelector(`mark[data-i="${i}"]`);
 if(mark){mark.classList.add("flash");mark.scrollIntoView({block:"center",behavior:"smooth"});setTimeout(()=>mark.classList.remove("flash"),900);}
 const card=document.querySelector(`.field[data-i="${i}"]`);
 if(card)card.scrollIntoView({block:"nearest"});
}

function reviewIndices(job){return job.fields.map((f,i)=>i).filter(i=>job.fields[i].decision==="review");}

document.addEventListener("keydown",e=>{
 const job=activeJob(); if(!job)return;
 if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"){if(e.key!=="Enter")return;}
 const revs=reviewIndices(job); if(!revs.length)return;
 if(e.key==="Tab"){e.preventDefault();
  const pos=revs.indexOf(job.sel); const next=revs[(pos+(e.shiftKey?-1:1)+revs.length)%revs.length];
  select(next);
 }else if(e.key==="Enter"&&job.sel>=0){e.preventDefault();
  job.fields[job.sel].reviewed=true; persist(); const rem=reviewIndices(job).filter(i=>!job.fields[i].reviewed);
  render(); if(rem.length)select(rem[0]);
 }
});

function exportJSON(){
 const job=activeJob(); if(!job){alert("Nothing to export yet.");return;}
 const obj={}; for(const f of job.fields) obj[f.path]={value:f.value,confidence:f.confidence,decision:f.reviewed?"confirmed":f.decision,edited:!!f.edited};
 const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
 const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
 a.download=(job.name.replace(/[^\w.-]+/g,"_")||"verified")+".json"; a.click();
}

function clearQueue(){ STATE={queue:[],cur:-1}; for(const k in PENDING_FILES)delete PENDING_FILES[k]; localStorage.removeItem(LS_KEY); render(); }

function persist(){
 try{
  const q=STATE.queue.map(j=>({id:j.id,name:j.name,kind:j.kind,text:j.text,
    status:j.status==="running"?"pending":j.status,fields:j.fields,sel:j.sel,error:j.error}));
  localStorage.setItem(LS_KEY,JSON.stringify({queue:q,cur:STATE.cur}));
 }catch(e){/* storage full / disabled — degrade silently */}
}

function restore(){
 try{
  const raw=localStorage.getItem(LS_KEY); if(!raw)return false;
  const data=JSON.parse(raw); if(!data||!data.queue||!data.queue.length)return false;
  STATE.queue=data.queue.map(j=>{
   if(j.status==="running")j.status="pending";
   if(j.status!=="done"&&j.kind==="file"){j.status="error"; j.error="file not saved across reloads — re-add it";}
   return j;
  });
  STATE.cur=(data.cur>=0&&data.cur<STATE.queue.length)?data.cur:(STATE.queue.length?0:-1);
  return true;
 }catch(e){return false;}
}

if(restore()) render(); else render();
</script></body></html>
